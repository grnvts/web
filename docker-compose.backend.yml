version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: repair_service_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    env_file:
      - backend/.env.example
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://db:5432/repair_service_db}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-postgres}
      APP_JWT_SECRET: ${APP_JWT_SECRET:-change-me}
      APP_RECAPTCHA_SECRET: ${APP_RECAPTCHA_SECRET:-change-me}
      APP_UPLOAD_PATH: ${APP_UPLOAD_PATH:-/opt/app/storage}
      SERVER_PORT: ${SERVER_PORT:-8501}
    ports:
      - "8501:8501"
    depends_on:
      - db
    volumes:
      - storage:/opt/app/storage

volumes:
  pgdata:
  storage:
