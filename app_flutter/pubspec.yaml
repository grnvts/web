name: app_flutter
description: Unified Flutter client for the building management system
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  http: ^1.1.0
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  image_picker: ^1.0.7
  pdf: ^3.10.8
  printing: ^5.11.1
  google_maps_flutter: ^2.6.1
  storybook_flutter: ^0.14.1
  stomp_dart_client: ^2.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
